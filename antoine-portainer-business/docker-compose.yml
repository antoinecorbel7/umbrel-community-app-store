version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: portainer_portainer_business_1
      APP_PORT: 9000
    container_name: portainer_app_proxy_1
  docker:
    image: >-
      docker:27.2.0-dind@sha256:f9f72ad901a78f27be922b2d320bbc263174f12919c1b37e6a01f828fa904565
    privileged: true
    network_mode: host
    stop_grace_period: 1m
    restart: on-failure
    environment:
      DOCKER_ENSURE_BRIDGE: dind0:10.32.0.1/16
    entrypoint: /entrypoint.sh
    command: |
      dockerd
        --bridge dind0
        --data-root /data/data
        --exec-root /data/exec
        --host unix:///data/docker.sock
        --pidfile /data/docker.pid
    volumes:
      - ${APP_DATA_DIR}/entrypoint.sh:/entrypoint.sh
      - ${APP_DATA_DIR}/data/docker:/data
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    container_name: portainer_docker_1
  portainer:
    image: >-
      portainer/portainer-ee:2.39.0@sha256:65eaa3d1b5e6e7378018817a8b3d826f970153c00ac3d2c3d3d2075037c19239
    command: '--host unix:///var/run/docker.sock --admin-password-file=/default-password --tunnel-addr=:8000'
    restart: on-failure
    ports:
      - "8000:8000"
    volumes:
      - ${APP_DATA_DIR}/default-password:/default-password
      - ${APP_DATA_DIR}/data/portainer:/data
      - ${APP_DATA_DIR}/data/docker:/var/run
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    container_name: portainer_portainer_business_1
